# Cheap single-box deployment: the app behind Caddy (automatic HTTPS).
# Uploads/reports persist in the named volume `dssg-data`, so they survive
# restarts and redeploys.
#
#   DOMAIN=dssg.example.com docker compose up -d --build
#
# Set DOMAIN to your real hostname to get a Let's Encrypt certificate
# automatically. Leave it unset to run on http://localhost for local testing.

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DSSG_DATA_DIR=/data
    volumes:
      - dssg-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  dssg-data:
  caddy-data:
  caddy-config:
